<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save to TiddlyWiki</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            min-width: 400px;
        }
        
        .container {
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        
        h1 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            color: #555;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="url"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }
        
        input[type="text"]:focus,
        input[type="url"]:focus {
            outline: none;
            border-color: #5778d8;
            box-shadow: 0 0 0 3px rgba(87, 120, 216, 0.1);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }
        
        button {
            flex: 1;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .btn-save {
            background: #5778d8;
            color: white;
        }
        
        .btn-save:hover {
            background: #4662c5;
        }
        
        .btn-cancel {
            background: #e0e0e0;
            color: #333;
        }
        
        .btn-cancel:hover {
            background: #d0d0d0;
        }
        
        .note {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }
    </style>
    <script src="funcs.js"></script>
</head>
<body>
    <div class="container">
        <h1>📌 Save to TiddlyWiki</h1>
        
        <form id="bookmarkForm" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="titleInput">Title</label>
                <input 
                    type="text" 
                    id="titleInput" 
                    name="title" 
                    required
                    autofocus
                >
                <div class="note">Forbidden characters [ ] { } | will be removed</div>
            </div>
            
            <div class="form-group">
                <label for="urlInput">URL</label>
                <input 
                    type="url" 
                    id="urlInput" 
                    name="url" 
                    readonly
                >
            </div>
            
            <div class="form-group">
                <label for="tagsInput">Tags</label>
                <input 
                    type="text" 
                    id="tagsInput" 
                    name="tags" 
                    placeholder="bookmark link"
                >
                <div class="note">Space-separated tags</div>
            </div>
            
            <div class="button-group">
                <button type="submit" class="btn-save">Save</button>
                <button type="button" class="btn-cancel" onclick="window.close()">Cancel</button>
            </div>
        </form>
    </div>
    
    <script>
        // Populate form from URL parameters on load
        window.addEventListener('DOMContentLoaded', function() {
            const params = getUrlParams();
            
            document.getElementById('titleInput').value = params.title;
            document.getElementById('urlInput').value = params.url;
            document.getElementById('tagsInput').value = 'bookmark link';
        });
        
        function handleSubmit(event) {
            event.preventDefault();
            
            const title = document.getElementById('titleInput').value;
            const url = document.getElementById('urlInput').value;
            const tags = document.getElementById('tagsInput').value;
            
            saveTiddler(title, url, tags);
        }
    </script>
</body>
</html>
